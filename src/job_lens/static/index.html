<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Lens — Job Description Analyzer</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b21;
      --border: #2a2e37;
      --text: #e8eaed;
      --muted: #9aa0a9;
      --accent: #4f8cff;
      --high: #ff5d5d;
      --medium: #ffb84d;
      --low: #6fd08c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-size: 1.8rem; margin-bottom: 4px; }
    .subtitle { color: var(--muted); margin-top: 0; }
    textarea {
      width: 100%;
      min-height: 260px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button {
      margin-top: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    .error { color: var(--high); margin-top: 12px; }
    .score-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 28px;
    }
    .score {
      font-size: 2.4rem;
      font-weight: 700;
      min-width: 90px;
      text-align: center;
    }
    .flag {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-top: 14px;
    }
    .flag.high { border-left-color: var(--high); }
    .flag.medium { border-left-color: var(--medium); }
    .flag.low { border-left-color: var(--low); }
    .flag-header { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      color: #111;
    }
    .badge.high { background: var(--high); }
    .badge.medium { background: var(--medium); }
    .badge.low { background: var(--low); }
    .category { color: var(--muted); font-size: 0.85rem; text-transform: capitalize; }
    blockquote {
      border-left: 3px solid var(--border);
      margin: 8px 0;
      padding: 4px 12px;
      color: var(--muted);
      font-style: italic;
    }
    .fix { background: rgba(111, 208, 140, 0.08); border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
    .fix strong { color: var(--low); }
    .no-flags { color: var(--low); font-size: 1.1rem; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Job Lens</h1>
    <p class="subtitle">Paste a job description and get AI-detected red flags with suggested fixes.</p>

    <textarea id="jd" placeholder="Paste the full job description here (minimum 50 characters)..."></textarea>
    <button id="analyze">Analyze</button>
    <div id="error" class="error"></div>
    <div id="results"></div>
  </div>

  <script>
    const btn = document.getElementById("analyze");
    const jd = document.getElementById("jd");
    const errorEl = document.getElementById("error");
    const resultsEl = document.getElementById("results");

    function scoreColor(score) {
      if (score >= 75) return "var(--low)";
      if (score >= 45) return "var(--medium)";
      return "var(--high)";
    }

    function esc(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    btn.addEventListener("click", async () => {
      errorEl.textContent = "";
      resultsEl.innerHTML = "";
      const text = jd.value.trim();
      if (text.length < 50) {
        errorEl.textContent = "Please paste a job description of at least 50 characters.";
        return;
      }
      btn.disabled = true;
      btn.textContent = "Analyzing…";
      try {
        const res = await fetch("/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_description: text }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || `Request failed (${res.status})`);
        }
        render(await res.json());
      } catch (e) {
        errorEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze";
      }
    });

    function render(data) {
      let html = `
        <div class="score-card">
          <div class="score" style="color:${scoreColor(data.overall_score)}">${data.overall_score}<span style="font-size:1rem;color:var(--muted)">/100</span></div>
          <p>${esc(data.summary)}</p>
        </div>`;

      if (data.red_flags.length === 0) {
        html += `<p class="no-flags">✅ No red flags found — this looks like a solid posting.</p>`;
      } else {
        html += `<h2 style="margin-top:28px">Red flags (${data.red_flags.length})</h2>`;
        for (const f of data.red_flags) {
          html += `
            <div class="flag ${f.severity}">
              <div class="flag-header">
                <span class="badge ${f.severity}">${f.severity}</span>
                <span class="category">${esc(f.category.replaceAll("_", " "))}</span>
              </div>
              <blockquote>“${esc(f.quote)}”</blockquote>
              <p>${esc(f.explanation)}</p>
              <div class="fix"><strong>Suggested fix:</strong> ${esc(f.suggested_fix)}</div>
            </div>`;
        }
      }
      resultsEl.innerHTML = html;
    }
  </script>
</body>
</html>
